<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,
        initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Wheels of Trucks</title>
    </head>
    <body>
        <div class="container">
            <h3> Welcome to the Wheels of Trucks
            <br>
            <br> Enter all of the choices divided by a comma (',').
            <br> Press enter when you're done</h3>
            <textarea placeholder="Enter choices here..."
            id="textarea"></textarea>

            <div id="tags">
                <span class="tag">Truck 1</span>
                <span class="tag highlight">Truck 2</span>
                <span class="tag">Truck 3</span>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
